# Config: CheXNet baseline
# Description: DenseNet121 baseline with BCE and plateau scheduler.

name: "chexnet_baseline"
seed: 42

data:
  root:      /kaggle/input/datasets/ashery/chexpert
  train_csv: /kaggle/working/TULIP-MedML/data/train_small_v2.csv
  val_csv:   /kaggle/working/TULIP-MedML/data/valid.csv
  val_uncertain_csv: /kaggle/working/TULIP-MedML/data/val_uncertain.csv
  img_size:   224
  uncertain:  "keep"
  word_vec:   null
  adj:        null

model:
  backbone:    "densenet121"
  num_classes: 14
  pretrained:  true

loss:
  type: "bce"

train:
  epochs:      20 
  batch_size:  16           # Paper-aligned default batch size.
  
  # Adam optimizer (paper-aligned).
  optimizer:   "adam"
  lr:          0.001        # Paper-aligned LR.
  beta1:       0.9          # Paper-aligned beta1.
  beta2:       0.999        # Paper-aligned beta2.

  # ReduceLROnPlateau: decay by x10 when val loss plateaus.
  scheduler:   "plateau"
  lr_factor:   0.1
  lr_patience: 3            # Decay after 3 plateau epochs.
  lr_min:      1.0e-6       # Lower LR floor.
  epoch_step:  []           # Unused; scheduler controls LR.

  workers: 2

output:
  save_dir: "/kaggle/working/checkpoints/chexnet"
  log_dir:  "/kaggle/working/logs/chexnet"